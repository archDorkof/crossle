<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Crossle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
      background: #121213;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    header {
      width: 100%;
      max-width: 500px;
      border-bottom: 1px solid #3a3a3c;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .game-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 10px 12px 4px;
      width: 100%;
      max-width: 500px;
      flex: 1;
    }

    /* ── Message toast ───────────────────────────────── */
    #message {
      min-height: 26px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-align: center;
      transition: opacity 0.3s;
    }
    #message.hidden { opacity: 0; }

    /* ── Cross display ───────────────────────────────── */
    .cross-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .cross-label {
      font-size: 0.65rem;
      color: #818384;
      letter-spacing: 2px;
    }

    .cross-grid {
      display: grid;
      grid-template-columns: repeat(5, 46px);
      grid-template-rows: repeat(5, 46px);
      gap: 5px;
    }

    .cross-cell {
      width: 46px;
      height: 46px;
      border: 2px solid #3a3a3c;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      text-transform: uppercase;
      transition: background 0.3s, border-color 0.3s;
    }
    .cross-cell.blank   { border: none; background: transparent; pointer-events: none; }
    .cross-cell.empty   { background: #121213; }
    .cross-cell.typing  { border-color: #818384; }
    .cross-cell.correct { background: #538d4e; border-color: #538d4e; }
    .cross-cell.present { background: #b59f3b; border-color: #b59f3b; }
    .cross-cell.absent  { background: #3a3a3c; border-color: #3a3a3c; }

    /* ── History grids ───────────────────────────────── */
    .history-wrap {
      display: flex;
      gap: 10px;
      justify-content: center;
      width: 100%;
    }

    .word-history {
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: center;
    }

    .word-history-label {
      font-size: 0.6rem;
      color: #818384;
      letter-spacing: 2px;
      margin-bottom: 2px;
    }

    .hist-row {
      display: flex;
      gap: 3px;
    }

    .hist-cell {
      width: 30px;
      height: 30px;
      border: 2px solid #3a3a3c;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      transition: background 0.25s;
    }
    .hist-cell.current-empty { border-color: #565758; }
    .hist-cell.current-typed { border-color: #999; }
    .hist-cell.correct { background: #538d4e; border-color: #538d4e; }
    .hist-cell.present { background: #b59f3b; border-color: #b59f3b; }
    .hist-cell.absent  { background: #3a3a3c; border-color: #3a3a3c; }

    .hist-cell.flip {
      animation: flip 0.5s ease forwards;
    }

    @keyframes flip {
      0%   { transform: scaleY(1); }
      50%  { transform: scaleY(0); }
      100% { transform: scaleY(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-4px); }
      40%       { transform: translateX(4px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .shake { animation: shake 0.35s ease; }

    /* ── Input switcher ──────────────────────────────── */
    .switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: #818384;
    }

    .pill {
      padding: 5px 14px;
      border-radius: 20px;
      border: 2px solid #3a3a3c;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      color: #818384;
      transition: border-color 0.15s, color 0.15s;
      touch-action: manipulation;
    }
    .pill.active {
      border-color: #fff;
      color: #fff;
    }
    .pill.done {
      border-color: #538d4e;
      color: #538d4e;
    }
    .pill.done.active {
      border-color: #6aaf60;
      color: #6aaf60;
    }

    /* ── Keyboard ────────────────────────────────────── */
    .keyboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
      padding-bottom: 8px;
    }

    .key-row {
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    .key {
      flex: 1;
      max-width: 40px;
      height: 54px;
      border: none;
      border-radius: 4px;
      background: #818384;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    .key.wide { max-width: 58px; font-size: 0.7rem; }
    .key.correct { background: #538d4e; }
    .key.present { background: #b59f3b; }
    .key.absent  { background: #3a3a3c; }

    /* ── Game over ───────────────────────────────────── */
    .game-over-bar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .new-game-btn {
      padding: 12px 32px;
      background: #538d4e;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 3px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .new-game-btn:active { filter: brightness(0.85); }

    .answer-reveal {
      font-size: 0.85rem;
      color: #818384;
      letter-spacing: 2px;
    }
    .answer-reveal span { color: #fff; font-weight: 700; }
  </style>
</head>
<body>

<header><h1>Crossle</h1></header>

<div class="game-wrap">

  <div id="message"></div>

  <!-- Cross display -->
  <div class="cross-wrap">
    <div class="cross-label">CROSS</div>
    <div class="cross-grid" id="cross-grid"></div>
  </div>

  <!-- History grids -->
  <div class="history-wrap">
    <div class="word-history">
      <div class="word-history-label">ACROSS</div>
      <div id="h-history"></div>
    </div>
    <div class="word-history">
      <div class="word-history-label">DOWN</div>
      <div id="v-history"></div>
    </div>
  </div>

  <!-- Input mode switcher -->
  <div class="switcher" id="switcher">
    <span>Typing:</span>
    <div class="pill active" id="pill-h" onclick="setActive('h')">ACROSS</div>
    <div class="pill" id="pill-v" onclick="setActive('v')">DOWN</div>
  </div>

  <!-- Game over area (hidden until game ends) -->
  <div class="game-over-bar" id="game-over-bar" style="display:none"></div>

  <!-- Keyboard -->
  <div class="keyboard" id="keyboard"></div>

</div>

// Deduplicate
const WORD_SET = [...new Set(WORDS)];

// ── State ──────────────────────────────────────────────────────────────────────
let wordH, wordV, attempts, curH, curV, active, over;

function initGame() {
  const pool = [...WORD_SET].sort(() => Math.random() - 0.5);
  wordH = pool[0];
  const mid = wordH[2];
  const vCandidates = WORD_SET.filter(w => w !== wordH && w[2] === mid);
  if (!vCandidates.length) { initGame(); return; }
  wordV = vCandidates[Math.floor(Math.random() * vCandidates.length)];

  attempts = [];
  curH = '';
  curV = '';
  active = 'h';
  over = false;

  document.getElementById('switcher').style.display = '';
  document.getElementById('game-over-bar').style.display = 'none';
  showMessage('');
  renderAll();
}

// ── Scoring ────────────────────────────────────────────────────────────────────
function score(guess, answer) {
  const res = Array(5).fill('absent');
  const pool = answer.split('');
  const used = Array(5).fill(false);
  for (let i = 0; i < 5; i++) {
    if (guess[i] === answer[i]) { res[i] = 'correct'; used[i] = true; }
  }
  for (let i = 0; i < 5; i++) {
    if (res[i] === 'correct') continue;
    for (let j = 0; j < 5; j++) {
      if (!used[j] && guess[i] === pool[j]) { res[i] = 'present'; used[j] = true; break; }
    }
  }
  return res;
}

// ── Keyboard letter states ─────────────────────────────────────────────────────
function keyStates() {
  const s = {};
  const rank = { correct: 3, present: 2, absent: 1 };
  for (const a of attempts) {
    [...a.hScore, ...a.vScore].forEach((st, i) => {
      const letter = i < 5 ? a.h[i] : a.v[i - 5];
      if (!s[letter] || rank[st] > rank[s[letter]]) s[letter] = st;
    });
  }
  return s;
}

// ── Best cross state (for cross grid) ─────────────────────────────────────────
function bestCrossState() {
  const hLetters = Array(5).fill('');
  const hStatus  = Array(5).fill(null);
  const vLetters = Array(5).fill('');
  const vStatus  = Array(5).fill(null);
  const rank = { correct: 3, present: 2, absent: 1 };

  for (const a of attempts) {
    for (let i = 0; i < 5; i++) {
      if (!hStatus[i] || rank[a.hScore[i]] > rank[hStatus[i]]) {
        hStatus[i] = a.hScore[i];
        hLetters[i] = a.hScore[i] === 'correct' ? a.h[i] : '';
      }
      if (!vStatus[i] || rank[a.vScore[i]] > rank[vStatus[i]]) {
        vStatus[i] = a.vScore[i];
        vLetters[i] = a.vScore[i] === 'correct' ? a.v[i] : '';
      }
    }
  }
  return { hLetters, hStatus, vLetters, vStatus };
}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderAll() {
  renderCross();
  renderHistory();
  renderKeyboard();
  renderPills();
}

function renderCross() {
  const grid = document.getElementById('cross-grid');
  grid.innerHTML = '';
  const { hLetters, hStatus, vLetters, vStatus } = bestCrossState();

  for (let row = 0; row < 5; row++) {
    for (let col = 0; col < 5; col++) {
      const cell = document.createElement('div');
      cell.className = 'cross-cell';
      const isH = row === 2;
      const isV = col === 2;

      if (!isH && !isV) {
        cell.classList.add('blank');
      } else if (isH && isV) {
        // Middle cell: best of H or V
        const rank = { correct: 3, present: 2, absent: 1 };
        const hs = hStatus[col], vs = vStatus[row];
        const best = (!hs && !vs) ? null : (!hs) ? vs : (!vs) ? hs : (rank[hs] >= rank[vs] ? hs : vs);
        if (best) {
          cell.classList.add(best);
          cell.textContent = hLetters[col] || vLetters[row];
        } else {
          cell.classList.add('empty');
          const letter = active === 'h' ? (curH[2] || '') : (curV[2] || '');
          cell.textContent = letter;
          if (letter) cell.classList.add('typing');
        }
      } else if (isH) {
        if (hStatus[col]) {
          cell.classList.add(hStatus[col]);
          cell.textContent = hLetters[col];
        } else {
          cell.classList.add('empty');
          if (active === 'h') {
            cell.textContent = curH[col] || '';
            if (cell.textContent) cell.classList.add('typing');
          }
        }
      } else {
        // isV
        const vi = row;
        if (vStatus[vi]) {
          cell.classList.add(vStatus[vi]);
          cell.textContent = vLetters[vi];
        } else {
          cell.classList.add('empty');
          if (active === 'v') {
            cell.textContent = curV[vi] || '';
            if (cell.textContent) cell.classList.add('typing');
          }
        }
      }

      grid.appendChild(cell);
    }
  }
}

function renderHistory() {
  const hGrid = document.getElementById('h-history');
  const vGrid = document.getElementById('v-history');
  hGrid.innerHTML = '';
  vGrid.innerHTML = '';

  for (let r = 0; r < 6; r++) {
    const hRow = document.createElement('div');
    hRow.className = 'hist-row';
    const vRow = document.createElement('div');
    vRow.className = 'hist-row';
    hRow.style.marginBottom = '3px';
    vRow.style.marginBottom = '3px';

    const att = attempts[r];
    const isCurrent = r === attempts.length && !over;

    for (let c = 0; c < 5; c++) {
      const hc = document.createElement('div');
      hc.className = 'hist-cell';
      const vc = document.createElement('div');
      vc.className = 'hist-cell';

      if (att) {
        hc.textContent = att.h[c];
        hc.classList.add(att.hScore[c]);
        vc.textContent = att.v[c];
        vc.classList.add(att.vScore[c]);
      } else if (isCurrent) {
        hc.textContent = curH[c] || '';
        hc.classList.add(curH[c] ? 'current-typed' : 'current-empty');
        vc.textContent = curV[c] || '';
        vc.classList.add(curV[c] ? 'current-typed' : 'current-empty');
      }

      hRow.appendChild(hc);
      vRow.appendChild(vc);
    }

    hGrid.appendChild(hRow);
    vGrid.appendChild(vRow);
  }
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const ks = keyStates();
  const rows = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫'],
  ];
  for (const row of rows) {
    const rowEl = document.createElement('div');
    rowEl.className = 'key-row';
    for (const k of row) {
      const btn = document.createElement('button');
      btn.className = 'key';
      btn.textContent = k;
      if (k === 'ENTER' || k === '⌫') btn.classList.add('wide');
      if (ks[k]) btn.classList.add(ks[k]);
      btn.addEventListener('pointerdown', e => { e.preventDefault(); handleKey(k); });
      rowEl.appendChild(btn);
    }
    kb.appendChild(rowEl);
  }
}

function renderPills() {
  const ph = document.getElementById('pill-h');
  const pv = document.getElementById('pill-v');
  if (!ph || !pv) return;

  ph.classList.toggle('active', active === 'h');
  pv.classList.toggle('active', active === 'v');

  const lastH = attempts.length ? attempts[attempts.length - 1] : null;
  ph.classList.toggle('done', curH.length === 5);
  pv.classList.toggle('done', curV.length === 5);
}

// ── Input ──────────────────────────────────────────────────────────────────────
function setActive(which) {
  if (over) return;
  active = which;
  renderAll();
}

function handleKey(key) {
  if (over) return;

  if (key === '⌫' || key === 'BACKSPACE') {
    if (active === 'h') curH = curH.slice(0, -1);
    else curV = curV.slice(0, -1);
    renderAll();
    return;
  }

  if (key === 'ENTER') { submitGuess(); return; }

  if (key === 'TAB') {
    active = active === 'h' ? 'v' : 'h';
    renderAll();
    return;
  }

  if (/^[A-Z]$/.test(key)) {
    if (active === 'h' && curH.length < 5) {
      curH += key;
      if (curH.length === 5) active = 'v'; // auto-switch
    } else if (active === 'v' && curV.length < 5) {
      curV += key;
    }
    renderAll();
  }
}

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Tab')       { e.preventDefault(); handleKey('TAB'); return; }
  if (e.key === 'Backspace') { handleKey('BACKSPACE'); return; }
  if (e.key === 'Enter')     { handleKey('ENTER'); return; }
  const k = e.key.toUpperCase();
  if (/^[A-Z]$/.test(k)) handleKey(k);
});

function submitGuess() {
  if (over) return;
  if (curH.length !== 5) { showMessage('ACROSS needs 5 letters'); shakeRow('h'); return; }
  if (curV.length !== 5) { showMessage('DOWN needs 5 letters');   shakeRow('v'); return; }
  if (!WORD_SET.includes(curH)) { showMessage(`${curH} not in word list`); shakeRow('h'); return; }
  if (!WORD_SET.includes(curV)) { showMessage(`${curV} not in word list`); shakeRow('v'); return; }

  const hScore = score(curH, wordH);
  const vScore = score(curV, wordV);
  attempts.push({ h: curH, v: curV, hScore, vScore });

  const hWon = hScore.every(s => s === 'correct');
  const vWon = vScore.every(s => s === 'correct');

  curH = '';
  curV = '';
  active = 'h';

  renderAll();

  if (hWon && vWon) {
    over = true;
    const msgs = ['Genius!', 'Amazing!', 'Brilliant!', 'Great!', 'Nice!', 'Phew!'];
    showMessage(msgs[attempts.length - 1] || 'Got it!');
    setTimeout(() => showGameOver(true), 600);
  } else if (attempts.length >= 6) {
    over = true;
    showMessage('Better luck next time!');
    setTimeout(() => showGameOver(false), 600);
  } else {
    showMessage('');
  }
}

function showGameOver(won) {
  document.getElementById('switcher').style.display = 'none';
  const bar = document.getElementById('game-over-bar');
  bar.style.display = '';
  bar.innerHTML = `
    <div class="answer-reveal">
      ACROSS: <span>${wordH}</span> &nbsp;|&nbsp; DOWN: <span>${wordV}</span>
    </div>
    <button class="new-game-btn" onclick="initGame()">NEW GAME</button>
  `;
}

// ── Utilities ──────────────────────────────────────────────────────────────────
let msgTimer;
function showMessage(msg) {
  const el = document.getElementById('message');
  el.textContent = msg;
  clearTimeout(msgTimer);
  if (msg) {
    msgTimer = setTimeout(() => {
      el.classList.add('hidden');
      setTimeout(() => { el.textContent = ''; el.classList.remove('hidden'); }, 300);
    }, 2000);
  }
}

function shakeRow(which) {
  const id = which === 'h' ? 'h-history' : 'v-history';
  const grid = document.getElementById(id);
  const rows = grid.querySelectorAll('.hist-row');
  const row = rows[attempts.length];
  if (!row) return;
  row.classList.remove('shake');
  void row.offsetWidth; // reflow
  row.classList.add('shake');
  row.addEventListener('animationend', () => row.classList.remove('shake'), { once: true });
}

// ── Start ──────────────────────────────────────────────────────────────────────
initGame();
</script>
